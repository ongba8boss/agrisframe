<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriS Avatar Studio - Twibbon Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Lexend', sans-serif; color: #1e293b; }
        .gradient-brand { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        .canvas-container {
            background-image: conic-gradient(#fff 0.25turn, #f1f5f9 0.25turn 0.5turn, #fff 0.5turn 0.75turn, #f1f5f9 0.75turn);
            background-size: 20px 20px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }
        canvas { cursor: grab; border-radius: 8px; }
        canvas:active { cursor: grabbing; }
        input[type="range"] { accent-color: #10b981; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .export-btn {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }
        .export-btn:hover {
            box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.4);
            transform: translateY(-2px);
        }
        /* Tỷ lệ 1920x1080 (16:9) cho Cover */
        .cover-container {
            width: 100%;
            aspect-ratio: 1920 / 1080;
            overflow: hidden;
            background-color: #064e3b;
            border-bottom: 4px solid #10b981;
        }
        .cover-banner {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #064e3b;
        }
        @media (min-width: 1024px) {
            .cover-banner {
                object-fit: cover;
            }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Cover Image Header -->
    <div class="cover-container shadow-lg">
        <img src="https://lh3.googleusercontent.com/u/0/d/190_JktMOVBXU3erDliKamVCgL2p48JBz=w1920" alt="AgriS Campaign Cover" class="cover-banner">
    </div>

    <!-- Header Text Section -->
    <header class="gradient-brand text-white pt-10 pb-20 px-4 text-center relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg width="100%" height="100%"><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/></pattern><rect width="100%" height="100%" fill="url(#grid)" /></svg>
        </div>
        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 tracking-tight">AgriS Avatar Studio</h1>
            <p class="text-emerald-50 text-lg font-light opacity-90">Hệ thống tạo ảnh đại diện chiến dịch tự động</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 -mt-16 mb-20 relative z-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Cột trái: Preview (Đã chuyển sang trái) -->
            <div class="lg:col-span-8 order-2 lg:order-1">
                <div class="bg-white p-6 md:p-10 rounded-[3rem] shadow-2xl border border-emerald-50 flex flex-col items-center">
                    <div class="w-full flex justify-between items-center mb-8 px-2">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-emerald-100"></div>
                            <div class="w-3 h-3 rounded-full bg-emerald-200"></div>
                            <div class="w-3 h-3 rounded-full bg-emerald-300"></div>
                        </div>
                        <span class="text-[10px] font-black text-emerald-800 bg-emerald-100 px-4 py-1 rounded-full tracking-widest uppercase">KẾT QUẢ XUẤT BẢN</span>
                    </div>
                    
                    <div class="canvas-container p-2 rounded-2xl bg-white shadow-lg border border-slate-100">
                        <canvas id="mainCanvas" width="800" height="800" class="w-full max-w-[500px] h-auto"></canvas>
                    </div>

                    <div class="mt-8 text-center space-y-2">
                        <p class="text-xs text-gray-500 font-bold uppercase tracking-widest">Kéo chuột trực tiếp để căn chỉnh khung hình</p>
                    </div>
                </div>
            </div>

            <!-- Cột phải: Điều khiển (Đã chuyển sang phải) -->
            <div class="lg:col-span-4 space-y-6 order-1 lg:order-2">
                
                <!-- Section: Tải tệp -->
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-emerald-50 space-y-4">
                    <h3 class="text-sm font-black text-emerald-800 uppercase tracking-widest flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Tải ảnh chân dung
                    </h3>
                    
                    <div class="space-y-3">
                        <div class="relative">
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 ml-1 uppercase tracking-wider">Chọn ảnh từ máy tính/điện thoại</label>
                            <input type="file" id="photoInput" accept="image/*" class="w-full text-xs text-gray-500 p-3 rounded-xl border-2 border-emerald-600 bg-white shadow-sm hover:bg-emerald-50 transition-all cursor-pointer">
                        </div>
                    </div>
                </div>

                <!-- Section: Công cụ chỉnh -->
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-emerald-50 space-y-4">
                    <div class="flex justify-between items-center">
                        <h3 class="text-sm font-black text-emerald-800 uppercase tracking-widest">Căn chỉnh vị trí</h3>
                        <button onclick="centerPhoto()" class="text-[10px] font-bold text-emerald-600 hover:bg-emerald-50 px-2 py-1 rounded transition-colors">CĂN GIỮA</button>
                    </div>
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-bold text-gray-400"><span>PHÓNG TO</span><span id="zoomVal">100%</span></div>
                            <input type="range" id="zoomRange" min="5" max="300" step="0.1" value="100" class="w-full">
                        </div>
                        <div class="space-y-2">
                            <div class="flex justify-between text-[10px] font-bold text-gray-400"><span>XOAY</span><span id="rotateVal">0°</span></div>
                            <input type="range" id="rotateRange" min="0" max="360" value="0" class="w-full">
                        </div>
                    </div>
                </div>

                <!-- Nút Export Chính -->
                <div class="space-y-3">
                    <button id="downloadBtn" class="export-btn w-full py-5 text-white font-black text-xl rounded-3xl transition-all flex items-center justify-center gap-3 active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        XUẤT ẢNH & TẢI VỀ
                    </button>
                    <p class="text-[10px] text-center text-gray-400 font-medium">Định dạng PNG chất lượng cao (800x800)</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * CÀI ĐẶT KHUNG MẶC ĐỊNH TỪ GOOGLE DRIVE
         */
        const DEFAULT_FRAME_URL = "https://lh3.googleusercontent.com/u/0/d/1dSV8vglDus71iwJDWOTGPyDMsNL9tgo3=w800-h800-iv1"; 

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const photoInput = document.getElementById('photoInput');
        const zoomRange = document.getElementById('zoomRange');
        const rotateRange = document.getElementById('rotateRange');
        const downloadBtn = document.getElementById('downloadBtn');

        let frameImg = new Image();
        let photoImg = new Image();
        let processedFrame = null;
        
        let frameLoaded = false;
        let photoLoaded = false;

        let state = { x: 400, y: 400, scale: 1, rotation: 0, isDragging: false, lastX: 0, lastY: 0 };

        function loadDefaultFrame() {
            frameImg.crossOrigin = "anonymous";
            frameImg.src = DEFAULT_FRAME_URL;
            frameImg.onload = () => {
                frameLoaded = true;
                processFrame();
            };
            frameImg.onerror = () => {
                frameLoaded = false;
                console.warn("Lỗi tải khung. Kiểm tra link ảnh khung.");
                draw();
            };
        }

        function processFrame() {
            if (!frameLoaded) return;
            const off = document.createElement('canvas');
            off.width = 800; off.height = 800;
            const octx = off.getContext('2d');
            
            if (frameImg.complete && frameImg.naturalWidth !== 0) {
                octx.drawImage(frameImg, 0, 0, 800, 800);
                
                try {
                    const data = octx.getImageData(0, 0, 800, 800);
                    for (let i = 0; i < data.data.length; i += 4) {
                        const r = data.data[i], g = data.data[i+1], b = data.data[i+2];
                        if (r < 65 && g < 65 && b < 65) {
                            data.data[i+3] = 0;
                        }
                    }
                    octx.putImageData(data, 0, 0);
                    processedFrame = off;
                } catch (e) {
                    processedFrame = off;
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            if (photoLoaded && photoImg.complete && photoImg.naturalWidth !== 0) {
                ctx.save();
                ctx.translate(state.x, state.y);
                ctx.rotate(state.rotation * Math.PI/180);
                const dw = photoImg.width * state.scale;
                const dh = photoImg.height * state.scale;
                ctx.drawImage(photoImg, -dw/2, -dh/2, dw, dh);
                ctx.restore();
            }

            if (processedFrame) {
                ctx.drawImage(processedFrame, 0, 0, 800, 800);
            } else if (frameLoaded && frameImg.complete && frameImg.naturalWidth !== 0) {
                ctx.drawImage(frameImg, 0, 0, 800, 800);
            } else {
                ctx.strokeStyle = '#cbd5e1';
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(40, 40, 720, 720);
                ctx.fillStyle = '#94a3b8';
                ctx.font = 'bold 16px Lexend';
                ctx.textAlign = 'center';
                ctx.fillText('ĐANG TẢI KHUNG HỆ THỐNG...', 400, 400);
            }
        }

        photoInput.onchange = (e) => {
            const r = new FileReader();
            r.onload = (v) => { 
                photoImg.src = v.target.result; 
                photoImg.onload = () => {
                    photoLoaded = true;
                    const initialScale = 800 / photoImg.width;
                    state.scale = initialScale;
                    const sliderValue = initialScale * 100;
                    zoomRange.value = sliderValue;
                    document.getElementById('zoomVal').textContent = Math.round(sliderValue) + '%';
                    centerPhoto();
                };
                photoImg.onerror = () => { photoLoaded = false; };
            };
            if(e.target.files[0]) r.readAsDataURL(e.target.files[0]);
        };

        zoomRange.oninput = (e) => { 
            state.scale = parseFloat(e.target.value) / 100; 
            document.getElementById('zoomVal').textContent = Math.round(e.target.value) + '%';
            draw(); 
        };
        
        rotateRange.oninput = (e) => { 
            state.rotation = parseInt(e.target.value); 
            document.getElementById('rotateVal').textContent = e.target.value + '°';
            draw(); 
        };
        
        function centerPhoto() { state.x = 400; state.y = 400; draw(); }

        const getPos = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (800/r.width), y: (cy - r.top) * (800/r.height) };
        };
        
        canvas.onmousedown = canvas.ontouchstart = (e) => { 
            if (!photoLoaded) return;
            state.isDragging = true; 
            const p = getPos(e); 
            state.lastX = p.x; state.lastY = p.y; 
        };
        
        window.onmousemove = window.ontouchmove = (e) => {
            if (!state.isDragging) return;
            if (e.type === 'touchmove') e.preventDefault();
            const p = getPos(e);
            state.x += (p.x - state.lastX);
            state.y += (p.y - state.lastY);
            state.lastX = p.x; state.lastY = p.y;
            draw();
        };
        
        window.onmouseup = window.ontouchend = () => state.isDragging = false;

        downloadBtn.onclick = () => {
            if (!photoLoaded) return alert('Hãy chọn ảnh chân dung trước khi xuất nhé!');
            const originalText = downloadBtn.innerHTML;
            downloadBtn.innerHTML = 'ĐANG XUẤT ẢNH...';
            downloadBtn.style.opacity = '0.7';
            setTimeout(() => {
                try {
                    const link = document.createElement('a');
                    link.download = 'AgriS_Avatar_Export.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                } catch (err) {
                    alert('Lỗi: Trình duyệt chặn quyền xuất ảnh. Hãy kiểm tra cài đặt CORS của ảnh nguồn.');
                }
                downloadBtn.innerHTML = originalText;
                downloadBtn.style.opacity = '1';
            }, 500);
        };

        loadDefaultFrame();
    </script>
</body>
</html>
